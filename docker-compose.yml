version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gopet_app
    ports:
      - "8080:80"
    volumes:
      # Montar el código local para desarrollo caliente (hot reload)
      - .:/var/www/html
      # Evitar que los directorios locales de vendor y node_modules se pisen con el contenedor
      - /var/www/html/vendor
      - /var/www/html/node_modules
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=SomeRandomStringWith32CharactersOrMore
      - DB_CONNECTION=mysql
      - DB_HOST=host.docker.internal
      - DB_PORT=3306
      - DB_DATABASE=proyectogopet
      - DB_USERNAME=root
      - DB_PASSWORD=
